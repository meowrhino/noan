<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noan Cittadino</title>
  <meta name="description" content="Portfolio of Noan Cittadino — Composer, Sound Designer & FMOD enthusiast.">
  <meta property="og:title" content="Noan Cittadino — Audio / Game Audio">
  <meta property="og:description" content="Composer, Sound Designer & FMOD enthusiast based in Barcelona.">
  <meta property="og:type" content="website">
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ====== HOME SCREEN ====== -->
  <div id="home-screen">
    <div id="home-panel">
      <div class="flip-container">
        <!-- ====== FRONT: portrait + nav buttons ====== -->
        <div class="flip-front">
          <div class="window-titlebar" id="home-titlebar">
            <span class="window-title">Noan Cittadino</span>
            <div class="titlebar-controls">
              <button class="close-btn" id="close-home" aria-label="Close" title="Close">&times;</button>
            </div>
          </div>
          <div id="home-body">
            <nav id="nav-buttons">
              <button class="nav-btn" id="btn-videos" aria-label="Videos" title="Videos">
                <img class="btn-icon" src="assets/icons/btn-videos.png" alt="">
                <img class="btn-icon-hover" src="assets/icons/btn-videos-hover.png" alt="">
              </button>
              <button class="nav-btn" id="btn-games" aria-label="Games" title="Games">
                <img class="btn-icon" src="assets/icons/btn-games.png" alt="">
                <img class="btn-icon-hover" src="assets/icons/btn-games-hover.png" alt="">
              </button>
              <button class="nav-btn" id="btn-map" aria-label="Map" title="Map">
                <img class="btn-icon" src="assets/icons/btn-map.png" alt="">
                <img class="btn-icon-hover" src="assets/icons/btn-map-hover.png" alt="">
              </button>
            </nav>
            <div id="portrait-area">
              <img id="portrait-img" src="" alt="Noan Cittadino" id="flip-trigger">
            </div>
          </div>
        </div>

        <!-- ====== BACK: about + credits ====== -->
        <div class="flip-back">
          <div class="window-titlebar">
            <button class="back-btn" id="flip-back-btn" aria-label="Back" title="Back">&larr;</button>
            <span class="window-title">About</span>
            <div class="titlebar-controls">
              <button class="close-btn" id="close-home-back" aria-label="Close" title="Close">&times;</button>
            </div>
          </div>
          <div id="about-text">
            <p id="about-bio"></p>
            <div id="credits">
              <p>Drawings by: <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">@artist</a></p>
              <p>Web: <a href="https://meowrhino.studio" target="_blank" rel="noopener noreferrer">meowrhino.studio</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Reopen button -->
    <button id="reopen-btn" hidden>noan</button>
  </div>

  <!-- ====== VIDEOS WINDOW ====== -->
  <div class="window-frame" id="window-videos" hidden>
    <div class="window-titlebar">
      <span class="window-title">Videos</span>
      <div class="titlebar-controls">
        <button class="close-btn" aria-label="Close" title="Close">&times;</button>
      </div>
    </div>
    <div class="window-content" id="videos-content"></div>
  </div>

  <!-- ====== GAMES WINDOW ====== -->
  <div class="window-frame" id="window-games" hidden>
    <div class="window-titlebar">
      <span class="window-title">Games</span>
      <div class="titlebar-controls">
        <button class="close-btn" aria-label="Close" title="Close">&times;</button>
      </div>
    </div>
    <div class="window-content" id="games-content"></div>
  </div>

  <!-- ====== MAP WINDOW ====== -->
  <div class="window-frame" id="window-map" hidden>
    <div class="window-titlebar">
      <span class="window-title">Map</span>
      <div class="titlebar-controls">
        <button class="close-btn" aria-label="Close" title="Close">&times;</button>
      </div>
    </div>
    <div class="window-content" id="map-content">
      <div class="map-container">
        <img src="assets/icons/map/map.png" alt="Map" class="map-bg">
      </div>
    </div>
  </div>

  <!-- ====== TEMPLATES ====== -->

  <!-- Video card -->
  <template id="tpl-video-card">
    <div class="card card-video">
      <div class="card-thumb">
        <img loading="lazy" alt="">
      </div>
      <div class="card-info">
        <span class="card-title"></span>
      </div>
    </div>
  </template>

  <!-- Game card -->
  <template id="tpl-game-card">
    <div class="card card-game">
      <div class="card-thumb">
        <img loading="lazy" alt="">
      </div>
      <div class="card-info">
        <span class="card-title"></span>
        <span class="card-desc-gray"></span>
        <span class="card-role"></span>
      </div>
      <div class="card-external" title="Opens in new tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </div>
    </div>
  </template>

  <!-- Player window -->
  <template id="tpl-player-window">
    <div class="window-frame player-window">
      <div class="window-titlebar">
        <span class="window-title"></span>
        <div class="titlebar-controls">
          <button class="close-btn" aria-label="Close" title="Close">&times;</button>
        </div>
      </div>
      <div class="window-content player-content"></div>
    </div>
  </template>

  <!-- Map pin -->
  <template id="tpl-map-pin">
    <a class="map-pin" target="_blank" rel="noopener noreferrer">
      <span class="map-pin-label"></span>
    </a>
  </template>

  <script src="app.js"></script>
</body>
</html>
